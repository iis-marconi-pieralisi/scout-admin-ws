services:
  db:
    image: mariadb:11.3.2-jammy
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: root_db
      MARIADB_USER: user
      MARIADB_PASSWORD: user
      TZ: Europe/Rome
    volumes:
      # RIMOSSO IL './' INIZIALE. Ora è un volume gestito da Docker
      - mariadb_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2.1-apache
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"

  php-app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/var/www/html
    depends_on:
      - db
    ports:
      - "3000:80"

# AGGIUNGI QUESTA SEZIONE IN FONDO AL FILE
volumes:
  mariadb_data: