<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test CRUD Iter</title>

    <!-- Bulma -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">

    <!-- file css -->
    <link rel="stylesheet" href="css/iterstyle.css">
</head>
<body>

<section class="section">
    <div class="container">

        <!-- Titolo -->
        <div class="page-title">
            <h1 class="title is-2">
                Test CRUD per <span class="has-text-primary">Iter</span>
            </h1>

            <p class="subtitle is-6">
                Interfaccia di test API CRUD
            </p>
        </div>

        <!-- Grid -->
        <div class="columns is-multiline">

            <!-- Form -->
            <div class="column is-5-desktop is-12-tablet">
                <div class="box">
                    <div class="field">
                        <label class="label">id_iter</label>
                        <div class="control">
                            <input
                                id="id_iter"
                                class="input"
                                type="number"
                                placeholder="Inserisci id_iter">
                        </div>
                    </div>
                    <div class="field">
                        <label class="label">Nome</label>
                        <div class="control">
                            <input
                                id="nome"
                                class="input"
                                type="text"
                                placeholder="Nome dell'iter">
                        </div>
                    </div>
                    <div class="field">
                        <label class="label">Descrizione</label>
                        <div class="control">
                            <textarea
                                id="descrizione"
                                class="textarea"
                                rows="4"
                                placeholder="Descrizione facoltativa"></textarea>
                        </div>
                    </div>
                    <div class="field">
                        <label class="label">id_branca</label>
                        <div class="control">
                            <input
                                id="id_branca"
                                class="input"
                                type="number"
                                placeholder="ID della branca">
                        </div>
                    </div>
                    <!-- Pulsanti -->
                    <div class="buttons mt-5">
                        <button
                            class="button is-link"
                            onclick="getIter()">
                            GET
                        </button>

                        <button
                            class="button is-success"
                            onclick="createIter()">
                            POST
                        </button>

                        <button
                            class="button is-warning"
                            onclick="updateIter()">
                            PUT
                        </button>

                        <button
                            class="button is-danger"
                            onclick="deleteIter()">
                            DELETE
                        </button>

                        <button
                            class="button is-dark"
                            onclick="clearFields()">
                            RESET
                        </button>

                    </div>

                </div>
            </div>

            <!-- Risposta API -->
            <div class="column is-7-desktop is-12-tablet">
                <div class="box">

                    <h2 class="title is-4">
                        Ultima risposta API
                    </h2>

                    <div id="response" class="response-box">
                        Nessuna chiamata ancora effettuata.
                    </div>

                </div>
            </div>

        </div>

        <!-- Risultati -->
        <div class="box mt-5">

            <h2 class="title is-4">
                Elenco Iter / Risultati GET
            </h2>

            <div class="result-box" id="result-list">
                I risultati verranno mostrati qui dopo il GET.
            </div>

        </div>

    </div>
</section>

<script src="main.js"></script>

</body>
</html>
